<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Banner</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="banner">
        <div class="grid-bg"></div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="left-panel">
            <div class="bars-scroll" id="barsScroll"></div>
        </div>

        <div class="right-panel">
            <div>
                <div class="greeting">
                    <span id="typed"></span><span class="cursor">|</span>
                </div>
                <div class="tagline">
                    <span class="tag-text tc1">Cogntiive Science</span>
                    <span class="tag-sep">•</span>
                    <span class="tag-text tc2">ML & Neural Computation</span>
                    <span class="tag-sep">•</span>
                    <span class="tag-text tc3">Data Science</span>
                </div>
            </div>
            <div class="footer">
                <span class="name-line">Anusha Shinde</span>
                <div class="status">
                    <div class="pulse"></div>
                    <span class="slabel">Active</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
